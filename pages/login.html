<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="login-shell">
  <div class="login-box">

    <!-- Logo centralizado -->
    <div class="login-top anim-1">
      <div class="ct-logo">
        <div class="ct-logo-icon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
        <span class="ct-logo-name">CondoTrack</span>
      </div>
    </div>

    <!-- Card de login -->
    <div class="ct-card login-card anim-2">

      <div class="login-heading">
        <h2>Bem-vindo de volta</h2>
        <p>Selecione seu perfil e faça o login</p>
      </div>

      <!-- Seletor de perfil -->
      <div class="profile-selector">
        <div class="profile-selector-label">Entrar como</div>
        <div class="profile-grid">
          <button class="profile-btn active" data-profile="morador" onclick="selecionarPerfil(this)">
            <span class="profile-btn-name">Morador</span>
            <span class="profile-btn-desc">Minhas entregas</span>
          </button>
          <button class="profile-btn" data-profile="porteiro" onclick="selecionarPerfil(this)">
            <span class="profile-btn-name">Porteiro</span>
            <span class="profile-btn-desc">Gerir portaria</span>
          </button>
          <button class="profile-btn" data-profile="admin" onclick="selecionarPerfil(this)">
            <span class="profile-btn-name">Admin</span>
            <span class="profile-btn-desc">Configurações</span>
          </button>
        </div>
      </div>

      <!-- Formulário -->
      <form id="login-form" novalidate>

        <div class="form-field anim-3">
          <label class="ct-label" for="email">E-mail</label>
          <input class="ct-input" type="email" id="email"
                 placeholder="seu@email.com" autocomplete="email" />
          <div class="ct-error" id="email-error" style="display:none"></div>
        </div>

        <div class="form-field anim-3">
          <div class="field-row">
            <label class="ct-label" for="senha" style="margin:0">Senha</label>
            <button type="button" class="forgot-link" onclick="esqueceuSenha()">Esqueci minha senha</button>
          </div>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="senha"
                   placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="alternarSenha()">
              <svg id="eye-icon" viewBox="0 0 24 24" stroke-width="2"
                   stroke-linecap="round" fill="none"
                   style="width:16px;height:16px;stroke:currentColor">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="senha-error" style="display:none"></div>
        </div>

        <div class="anim-4" style="margin-top:4px">
          <div class="ct-error" id="form-error" style="display:none"></div>
          <button type="submit" class="ct-btn-primary" id="login-btn"
                  onclick="handleLogin(event)">
            <span data-texto style="display:flex;align-items:center;gap:8px">
              Entrar
              <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none"
                   stroke="currentColor" style="width:15px;height:15px">
                <path d="M5 12h14M12 5l7 7-7 7"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span data-spinner class="spinner" style="display:none"></span>
          </button>
        </div>

      </form>

    </div>

    <!-- Rodapé -->
    <div class="login-footer anim-5">
      Ainda não tem conta?
      <a href="cadastro.html">Cadastre-se como morador</a>
    </div>

    <div class="login-bottom anim-6">
      <svg viewBox="0 0 24 24" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      CondoTrack v1.0
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
