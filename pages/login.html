<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Login</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/login.css" />
</head>
<body>

<div class="login-shell">
  <div class="login-box">

    <!-- Logo centralizado -->
    <div class="login-top anim-1">
      <div class="ct-logo">
        <img src="../img/logo.png" alt="CondoTrack" style="height:72px;object-fit:contain"/>
      </div>
    </div>

    <!-- Card de login -->
    <div class="ct-card login-card anim-2">

      <div class="login-heading">
        <h2>Bem-vindo de volta</h2>
        <p>Entre com seu e-mail e senha para acessar</p>
      </div>

      <!-- Hint de perfil detectado automaticamente -->
      <div id="perfil-hint" style="display:none;font-size:12px;color:var(--p-600);font-weight:600;
           text-align:center;margin-bottom:16px;padding:8px 12px;
           background:var(--p-50);border-radius:var(--radius-md);
           display:flex;align-items:center;justify-content:center;gap:6px">
        <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="var(--p-600)" style="width:14px;height:14px">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span id="perfil-hint-texto"></span>
      </div>

      <!-- Formulário -->
      <form id="login-form" novalidate>

        <div class="form-field anim-3">
          <label class="ct-label" for="email">E-mail</label>
          <input class="ct-input" type="email" id="email"
                 placeholder="seu@email.com" autocomplete="email" />
          <div class="ct-error" id="email-error" style="display:none"></div>
        </div>

        <div class="form-field anim-3">
          <div class="field-row">
            <label class="ct-label" for="senha" style="margin:0">Senha</label>
            <button type="button" class="forgot-link" onclick="abrirEsqueciSenha()">Esqueci minha senha</button>
          </div>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="senha"
                   placeholder="••••••••" autocomplete="current-password" />
            <button type="button" class="eye-btn" onclick="alternarSenha()">
              <svg id="eye-icon" viewBox="0 0 24 24" stroke-width="2"
                   stroke-linecap="round" fill="none"
                   style="width:16px;height:16px;stroke:currentColor">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="senha-error" style="display:none"></div>
        </div>

        <div class="anim-4" style="margin-top:4px">
          <div class="ct-error" id="form-error" style="display:none"></div>
          <button type="submit" class="ct-btn-primary" id="login-btn"
                  onclick="handleLogin(event)">
            <span data-texto style="display:flex;align-items:center;gap:8px">
              Entrar
              <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none"
                   stroke="currentColor" style="width:15px;height:15px">
                <path d="M5 12h14M12 5l7 7-7 7"
                      stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span data-spinner class="spinner" style="display:none"></span>
          </button>
        </div>

      </form>

    </div>

    <!-- Rodapé -->
    <div class="login-footer anim-5">
      Ainda não tem conta?
      <a href="cadastro.html">Cadastre-se como morador</a>
    </div>

    <div class="login-bottom anim-6">
      <svg viewBox="0 0 24 24" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      CondoTrack v1.0
    </div>

  </div>
</div>

<!-- ── Modal: Esqueci minha senha ── -->
<div class="modal-overlay" id="modal-esqueci" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:50;align-items:center;justify-content:center">
  <div style="background:var(--n-0);border-radius:var(--radius-xl);width:100%;max-width:400px;padding:28px;margin:16px;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:modalIn .2s ease both">

    <!-- Formulário -->
    <div id="reset-form-wrap">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
        <div style="font-size:17px;font-weight:700;color:var(--n-900)">Redefinir senha</div>
        <button onclick="fecharEsqueciSenha()" style="width:28px;height:28px;border-radius:8px;background:var(--n-100);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none" stroke="var(--n-500)" style="width:14px;height:14px">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </button>
      </div>
      <p style="font-size:13px;color:var(--n-500);line-height:1.6;margin-bottom:20px">
        Informe seu e-mail e enviaremos um link para redefinir sua senha.
      </p>
      <form id="form-reset" novalidate onsubmit="enviarResetSenha(event)">
        <div style="margin-bottom:14px">
          <label class="ct-label" for="reset-email">E-mail</label>
          <input class="ct-input" type="email" id="reset-email" placeholder="seu@email.com" />
          <div class="ct-error" id="reset-email-err" style="display:none"></div>
        </div>
        <button type="submit" class="ct-btn-primary">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor" style="width:14px;height:14px" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          Enviar link de redefinição
        </button>
      </form>
    </div>

    <!-- Sucesso -->
    <div id="reset-sucesso-wrap" style="display:none;text-align:center;padding:8px 0">
      <div style="width:64px;height:64px;background:#F0FDF4;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#16A34A" style="width:30px;height:30px">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <div style="font-size:17px;font-weight:700;color:var(--n-900);margin-bottom:8px">E-mail enviado!</div>
      <p style="font-size:13px;color:var(--n-500);line-height:1.6;margin-bottom:20px">
        Verifique sua caixa de entrada e clique no link para redefinir sua senha.
      </p>
      <button onclick="fecharEsqueciSenha()" class="ct-btn-primary" style="width:auto;padding:10px 28px">
        Fechar
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/login.js"></script>
</body>
</html>
