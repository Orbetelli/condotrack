<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Porteiro</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/porteiro.css" />
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sb-logo" style="padding:2px;background:white;border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;overflow:hidden">
      <img src="../img/logo.png" alt="CondoTrack" style="width:32px;height:32px;object-fit:contain"/>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-tip="Dashboard" onclick="ativarSidebar(this);mudarTabPorteiro('dashboard')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="sb-item" data-tip="Entregas" onclick="ativarSidebar(this);mudarTabPorteiro('entregas')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        <div class="sb-badge"></div>
      </button>
      <button class="sb-item" data-tip="Moradores" onclick="ativarSidebar(this);mudarTabPorteiro('moradores')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
      </button>
      <button class="sb-item" data-tip="Histórico" onclick="ativarSidebar(this);mudarTabPorteiro('historico')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </button>
      <div class="sb-divider"></div>
      <button class="sb-item" data-tip="Sair" onclick="encerrarSessao()">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </nav>
    <div class="sb-avatar" id="sb-avatar">PT</div>
  </aside>

  <!-- ── Conteúdo principal ── -->
  <div class="main">

    <!-- Header -->
    <header class="header" style="position:relative">
      <div>
        <div class="header-greeting">—</div>
        <div class="header-sub">—</div>
      </div>
      <div class="header-actions">
        <div class="header-notif" id="btn-notif" onclick="toggleNotificacoes()" style="cursor:pointer">
          <svg viewBox="0 0 24 24" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <div class="header-notif-dot" id="notif-dot" style="display:none"></div>
        </div>

        <!-- Painel de notificações -->
        <div id="notif-painel" style="
          display:none;position:absolute;top:54px;right:16px;
          width:320px;background:var(--n-0);border:1px solid var(--n-200);
          border-radius:var(--radius-lg);box-shadow:0 8px 32px rgba(0,0,0,.15);
          z-index:99;overflow:hidden;max-height:420px;overflow-y:auto">
          <div style="padding:12px 16px;border-bottom:1px solid var(--n-100);
                      display:flex;align-items:center;justify-content:space-between">
            <span style="font-size:13px;font-weight:700;color:var(--n-900)">Notificações</span>
            <button onclick="toggleNotificacoes()" style="background:none;border:none;cursor:pointer;
                    color:var(--n-400);font-size:12px">Fechar</button>
          </div>
          <div id="notif-lista" style="padding:4px 0">
            <div style="padding:20px;text-align:center;font-size:12px;color:var(--n-400)">
              Carregando...
            </div>
          </div>
        </div>
        <button class="btn-nova-entrega" id="btn-nova-entrega">
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          Nova entrega
        </button>
      </div>
    </header>

    <!-- Abas -->
    <nav class="nav-tabs">
      <div class="nav-tab active" data-tab="dashboard" onclick="mudarTabPorteiro('dashboard')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
        </svg>
        Dashboard
      </div>
      <div class="nav-tab" data-tab="entregas" onclick="mudarTabPorteiro('entregas')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        </svg>
        Entregas
      </div>
      <div class="nav-tab" data-tab="moradores" onclick="mudarTabPorteiro('moradores')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
        </svg>
        Moradores
      </div>
      <div class="nav-tab" data-tab="historico" onclick="mudarTabPorteiro('historico')">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        Histórico
      </div>
    </nav>

    <!-- Body dinâmico -->
    <main class="body" id="tab-body-porteiro"></main>

  </div>
</div>

<!-- ── Modal: nova entrega ── -->
<div class="modal-overlay" id="modal-nova">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Registrar nova entrega</div>
      <button class="modal-close" onclick="fecharModalNova()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="form-nova" novalidate>
      <div class="modal-grid">
        <div class="modal-field">
          <label class="ct-label" for="nova-apto">Apartamento</label>
          <input class="ct-input" type="text" id="nova-apto" placeholder="Ex: A-101" />
          <div class="ct-error" id="err-apto" style="display:none"></div>
        </div>
        <div class="modal-field">
          <label class="ct-label" for="nova-volumes">Nº de volumes</label>
          <input class="ct-input" type="number" id="nova-volumes" placeholder="1" min="1" />
          <div class="ct-error" id="err-volumes" style="display:none"></div>
        </div>
      </div>
      <div class="modal-field">
        <label class="ct-label" for="nova-trans">Transportadora</label>
        <input class="ct-input" type="text" id="nova-trans"
               placeholder="Ex: Correios, Amazon, Mercado Livre..." />
        <div class="ct-error" id="err-trans" style="display:none"></div>
      </div>
      <div class="modal-field">
        <label class="ct-label" for="nova-obs">Observações (opcional)</label>
        <input class="ct-input" type="text" id="nova-obs"
               placeholder="Ex: Caixa frágil, 2 volumes grandes..." />
      </div>
      <div class="modal-actions">
        <button type="button" class="ct-btn-ghost" onclick="fecharModalNova()">Cancelar</button>
        <button type="submit" class="ct-btn-primary" id="btn-nova-entrega-2">
          <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none" stroke="currentColor"
               style="width:15px;height:15px" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Registrar entrega
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ── Modal: detalhe da entrega ── -->
<div class="modal-overlay" id="modal-detalhe">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="detalhe-titulo">Entrega #000</div>
      <button class="modal-close" onclick="fecharDetalhe()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="detail-row">
      <span class="detail-label">Apartamento</span>
      <span class="detail-value" id="detalhe-apto">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Morador</span>
      <span class="detail-value" id="detalhe-morador">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Transportadora</span>
      <span class="detail-value" id="detalhe-trans">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Recebido em</span>
      <span class="detail-value" id="detalhe-data">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Volumes</span>
      <span class="detail-value" id="detalhe-volumes">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Observações</span>
      <span class="detail-value" id="detalhe-obs">—</span>
    </div>
    <div class="detail-row">
      <span class="detail-label">Status</span>
      <span class="detail-value entry-badge" id="detalhe-status">—</span>
    </div>
    <div class="modal-actions" style="margin-top:20px">
      <button type="button" class="ct-btn-ghost" onclick="fecharDetalhe()">Fechar</button>
      <button type="button" class="ct-btn-primary" id="btn-confirmar-retirada"
              onclick="confirmarRetirada()" style="display:none">
        <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none" stroke="currentColor"
             style="width:15px;height:15px" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Confirmar retirada
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/porteiro.js"></script>
</body>
</html>
