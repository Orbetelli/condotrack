<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Cadastro de Morador</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/cadastro.css" />
</head>
<body>

<div class="reg-shell">
  <div class="reg-container">

    <!-- Topo -->
    <div class="reg-top anim-1">
      <div class="ct-logo">
        <img src="../img/logo.png" alt="CondoTrack" style="height:140px;object-fit:contain"/>
      </div>
      <a href="login.html" class="ct-btn-ghost">
        <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor"
             style="width:14px;height:14px">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar ao login
      </a>
    </div>

    <!-- Card -->
    <div class="ct-card reg-card anim-2">

      <div class="reg-header">
        <h2>Criar sua conta</h2>
        <p>Res. das Palmeiras · Cadastro de morador</p>
      </div>

      <!-- Stepper -->
      <div class="stepper" id="stepper">
        <div class="step-item">
          <div class="step-circle active" id="dot-0">1</div>
          <div class="step-label active"  id="lbl-0">Seus dados</div>
        </div>
        <div class="step-line" id="line-0"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-1">2</div>
          <div class="step-label"      id="lbl-1">Apartamento</div>
        </div>
        <div class="step-line" id="line-1"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-2">3</div>
          <div class="step-label"      id="lbl-2">Senha</div>
        </div>
      </div>

      <!-- Passo 0: dados pessoais -->
      <div id="step-0">
        <div class="grid2">
          <div class="form-field col-span-2">
            <label class="ct-label" for="nome">Nome completo</label>
            <input class="ct-input" type="text" id="nome" placeholder="Maria da Silva Costa" />
            <div class="ct-error" id="nome-err" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="cpf">CPF</label>
            <input class="ct-input" type="text" id="cpf"
                   placeholder="000.000.000-00" maxlength="14" />
            <div class="ct-error" id="cpf-err" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="tel">Telefone / WhatsApp</label>
            <input class="ct-input" type="tel" id="tel"
                   placeholder="(11) 99999-0000" maxlength="15" />
            <div class="ct-error" id="tel-err" style="display:none"></div>
          </div>
          <div class="form-field col-span-2">
            <label class="ct-label" for="email">E-mail</label>
            <input class="ct-input" type="email" id="email" placeholder="maria@email.com" />
            <div class="ct-error" id="email-err" style="display:none"></div>
          </div>
        </div>
        <div class="action-row">
          <button class="ct-btn-primary" onclick="irPasso(1)" style="flex:1">Continuar</button>
        </div>
      </div>

      <!-- Passo 1: apartamento -->
      <div id="step-1" style="display:none">
        <div class="apt-section-label">
          Selecione seu apartamento. Os riscados já possuem morador cadastrado.
        </div>
        <div class="apt-grid" id="apt-grid"></div>
        <div class="ct-error" id="apto-err" style="display:none"></div>
        <div class="apt-legend">
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--p-600);border-color:var(--p-600)"></div>
            Selecionado
          </div>
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--n-50);border-color:var(--n-100)"></div>
            Ocupado
          </div>
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--n-0);border-color:var(--n-200)"></div>
            Disponível
          </div>
        </div>
        <div class="action-row">
          <button class="ct-btn-ghost" onclick="irPasso(0)">Voltar</button>
          <button class="ct-btn-primary" onclick="irPasso(2)">Continuar</button>
        </div>
      </div>

      <!-- Passo 2: senha -->
      <div id="step-2" style="display:none">
        <div class="summary-box" id="summary-box"></div>
        <div class="form-field" style="margin-bottom:14px">
          <label class="ct-label" for="senha">Senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="senha"
                   placeholder="Mínimo 6 caracteres" />
            <button type="button" class="eye-btn" onclick="alternarSenha('senha','eye1')">
              <svg id="eye1" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="senha-err" style="display:none"></div>
        </div>
        <div class="form-field">
          <label class="ct-label" for="confirma">Confirmar senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="confirma"
                   placeholder="Repita a senha" />
            <button type="button" class="eye-btn" onclick="alternarSenha('confirma','eye2')">
              <svg id="eye2" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="confirma-err" style="display:none"></div>
        </div>
        <div class="action-row">
          <button class="ct-btn-ghost" onclick="irPasso(1)">Voltar</button>
          <button class="ct-btn-primary" onclick="finalizar()">Finalizar cadastro</button>
        </div>
      </div>

      <!-- Sucesso -->
      <div class="success-screen" id="success-screen">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h3>Cadastro realizado!</h3>
        <p id="success-msg"></p>
        <a href="login.html" class="ct-btn-primary"
           style="width:auto;display:inline-flex;padding:11px 32px;text-decoration:none">
          Ir para o login
        </a>
      </div>

    </div>

    <p class="anim-3"
       style="text-align:center;font-size:13px;color:var(--n-400);margin-top:18px">
      Já tem conta?
      <a href="login.html"
         style="color:var(--p-600);font-weight:600;text-decoration:none">
        Fazer login
      </a>
    </p>

  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/cadastro.js"></script>
</body>
</html>
