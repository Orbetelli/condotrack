<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Cadastro de Morador</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/cadastro.css" />
  <style>
    .condo-option {
      padding: 10px 14px;
      cursor: pointer;
      border-bottom: 1px solid var(--n-100);
      transition: background .12s;
    }
    .condo-option:last-child { border-bottom: none; }
    .condo-option:hover { background: var(--p-50); }
  </style>
</head>
<body>

<div class="reg-shell">
  <div class="reg-container">

    <!-- Topo -->
    <div class="reg-top anim-1">
      <div class="ct-logo">
        <div class="ct-logo-icon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </div>
        <span class="ct-logo-name">CondoTrack</span>
      </div>
      <a href="login.html" class="ct-btn-ghost">
        <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="currentColor"
             style="width:14px;height:14px">
          <path d="M19 12H5M12 5l-7 7 7 7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Voltar ao login
      </a>
    </div>

    <!-- Card -->
    <div class="ct-card reg-card anim-2">

      <div class="reg-header" id="reg-header">
        <h2>Criar sua conta</h2>
        <p>Cadastro de morador · CondoTrack</p>
      </div>

      <!-- Stepper 4 passos -->
      <div class="stepper" id="stepper">
        <div class="step-item">
          <div class="step-circle active" id="dot-0">1</div>
          <div class="step-label active"  id="lbl-0">Condomínio</div>
        </div>
        <div class="step-line" id="line-0"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-1">2</div>
          <div class="step-label"      id="lbl-1">Seus dados</div>
        </div>
        <div class="step-line" id="line-1"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-2">3</div>
          <div class="step-label"      id="lbl-2">Apartamento</div>
        </div>
        <div class="step-line" id="line-2"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-3">4</div>
          <div class="step-label"      id="lbl-3">Senha</div>
        </div>
      </div>

      <!-- Passo 0: condomínio -->
      <div id="step-0">
        <div class="form-field" style="margin-bottom:8px">
          <label class="ct-label" for="busca-condo">Seu condomínio</label>
          <div class="condo-search-wrap" style="position:relative">
            <input class="ct-input" type="text" id="busca-condo"
                   placeholder="Digite o nome do condomínio..." autocomplete="off"/>
            <div id="lista-condos" style="display:none;position:absolute;top:calc(100% + 4px);
                 left:0;right:0;background:var(--n-0);border:1.5px solid var(--n-200);
                 border-radius:var(--radius-md);box-shadow:var(--shadow-md);
                 z-index:20;max-height:200px;overflow-y:auto"></div>
          </div>
          <div class="ct-error" id="condo-err" style="display:none"></div>
        </div>
        <div id="condo-selecionado" style="display:none;align-items:center;gap:10px;
             background:var(--p-50);border:1.5px solid var(--p-200);
             border-radius:var(--radius-md);padding:10px 14px;margin-bottom:4px">
          <svg viewBox="0 0 24 24" stroke-width="2" fill="none" stroke="var(--p-600)"
               style="width:16px;height:16px;flex-shrink:0">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:var(--p-800)" id="condo-selecionado-nome"></div>
            <div style="font-size:11px;color:var(--p-600)" id="condo-selecionado-local"></div>
          </div>
          <button type="button" onclick="limparCondo()"
                  style="background:none;border:none;cursor:pointer;color:var(--p-400);font-size:18px;line-height:1">×</button>
        </div>
        <div class="action-row">
          <button class="ct-btn-primary" onclick="irPasso(1)" style="flex:1">Continuar</button>
        </div>
      </div>

      <!-- Passo 1: dados pessoais -->
      <div id="step-1" style="display:none">
        <div class="grid2">
          <div class="form-field col-span-2">
            <label class="ct-label" for="nome">Nome completo</label>
            <input class="ct-input" type="text" id="nome" placeholder="Maria da Silva Costa" />
            <div class="ct-error" id="nome-err" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="cpf">CPF</label>
            <input class="ct-input" type="text" id="cpf"
                   placeholder="000.000.000-00" maxlength="14" />
            <div class="ct-error" id="cpf-err" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="tel">Telefone / WhatsApp</label>
            <input class="ct-input" type="tel" id="tel"
                   placeholder="(11) 99999-0000" maxlength="15" />
            <div class="ct-error" id="tel-err" style="display:none"></div>
          </div>
          <div class="form-field col-span-2">
            <label class="ct-label" for="email">E-mail</label>
            <input class="ct-input" type="email" id="email" placeholder="maria@email.com" />
            <div class="ct-error" id="email-err" style="display:none"></div>
          </div>
        </div>
        <div class="action-row">
          <button class="ct-btn-ghost" onclick="irPasso(0)">Voltar</button>
          <button class="ct-btn-primary" onclick="irPasso(2)">Continuar</button>
        </div>
      </div>

      <!-- Passo 2: apartamento -->
      <div id="step-2" style="display:none">
        <div class="apt-section-label">
          Selecione seu apartamento. Os riscados já possuem morador cadastrado.
        </div>
        <div style="margin-bottom:10px">
          <input class="ct-input" type="text" id="busca-apto"
                 placeholder="Buscar apartamento ex: A-101" />
        </div>
        <div class="apt-grid" id="apt-grid"></div>
        <div class="ct-error" id="apto-err" style="display:none"></div>
        <div class="apt-legend">
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--p-600);border-color:var(--p-600)"></div>
            Selecionado
          </div>
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--n-50);border-color:var(--n-100)"></div>
            Ocupado
          </div>
          <div class="apt-legend-item">
            <div class="apt-legend-dot"
                 style="background:var(--n-0);border-color:var(--n-200)"></div>
            Disponível
          </div>
        </div>
        <div class="action-row">
          <button class="ct-btn-ghost" onclick="irPasso(1)">Voltar</button>
          <button class="ct-btn-primary" onclick="irPasso(3)">Continuar</button>
        </div>
      </div>

      <!-- Passo 3: senha -->
      <div id="step-3" style="display:none">
        <div class="summary-box" id="summary-box"></div>
        <div class="form-field" style="margin-bottom:14px">
          <label class="ct-label" for="senha">Senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="senha"
                   placeholder="Mínimo 6 caracteres" />
            <button type="button" class="eye-btn" onclick="alternarSenha('senha','eye1')">
              <svg id="eye1" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="senha-err" style="display:none"></div>
        </div>
        <div class="form-field">
          <label class="ct-label" for="confirma">Confirmar senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="confirma"
                   placeholder="Repita a senha" />
            <button type="button" class="eye-btn" onclick="alternarSenha('confirma','eye2')">
              <svg id="eye2" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="confirma-err" style="display:none"></div>
        </div>
        <div class="action-row">
          <button class="ct-btn-ghost" onclick="irPasso(2)">Voltar</button>
          <button class="ct-btn-primary" id="btn-finalizar" onclick="finalizar()">Finalizar cadastro</button>
        </div>
      </div>

      <!-- Sucesso -->
      <div class="success-screen" id="success-screen">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h3>Cadastro realizado!</h3>
        <p id="success-msg"></p>
        <a href="login.html" class="ct-btn-primary"
           style="width:auto;display:inline-flex;padding:11px 32px;text-decoration:none">
          Ir para o login
        </a>
      </div>

    </div>

    <p class="anim-3"
       style="text-align:center;font-size:13px;color:var(--n-400);margin-top:18px">
      Já tem conta?
      <a href="login.html"
         style="color:var(--p-600);font-weight:600;text-decoration:none">
        Fazer login
      </a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/cadastro.js"></script>
</body>
</html>
