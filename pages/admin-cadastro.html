<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Cadastro do Síndico</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin-cadastro.css" />
</head>
<body>

<div class="reg-shell">
  <div class="reg-container">

    <!-- Topo -->
    <div class="reg-top anim-1">
      <div class="ct-logo">
        <div class="ct-logo-icon">
          <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" fill="none">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
          </svg>
        </div>
        <span class="ct-logo-name">CondoTrack</span>
      </div>
    </div>

    <!-- Erro global de link inválido (fora do card, visível antes do stepper) -->
    <div id="erro-link" class="ct-error" style="display:none;margin-bottom:12px"></div>

    <!-- Card principal -->
    <div class="ct-card reg-card anim-2">

      <div class="reg-header" id="reg-header">
        <h2>Bem-vindo, síndico!</h2>
        <p>
          Conclua seu cadastro para acessar o painel do
          <strong id="nome-condo-convite" style="color:var(--p-700)">...</strong>
        </p>
      </div>

      <!-- Stepper 2 passos -->
      <div class="stepper" id="stepper">
        <div class="step-item">
          <div class="step-circle active" id="dot-0">1</div>
          <div class="step-label active"  id="lbl-0">Seus dados</div>
        </div>
        <div class="step-line" id="line-0"></div>
        <div class="step-item">
          <div class="step-circle idle" id="dot-1">2</div>
          <div class="step-label"      id="lbl-1">Senha</div>
        </div>
      </div>

      <!-- Passo 0: dados pessoais -->
      <div id="step-0">
        <div class="grid2">
          <div class="form-field col-span-2">
            <label class="ct-label" for="nome">Nome completo</label>
            <input class="ct-input" type="text" id="nome" placeholder="João da Silva" />
            <div class="ct-error" id="err-nome" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="cpf">CPF</label>
            <input class="ct-input" type="text" id="cpf"
                   placeholder="000.000.000-00" maxlength="14" />
            <div class="ct-error" id="err-cpf" style="display:none"></div>
          </div>
          <div class="form-field">
            <label class="ct-label" for="telefone">Telefone / WhatsApp</label>
            <input class="ct-input" type="tel" id="telefone"
                   placeholder="(11) 99999-0000" maxlength="15" />
            <div class="ct-error" id="err-tel" style="display:none"></div>
          </div>
          <div class="form-field col-span-2">
            <label class="ct-label" for="email">E-mail</label>
            <input class="ct-input" type="email" id="email" placeholder="joao@email.com" />
            <div class="ct-error" id="err-email" style="display:none"></div>
          </div>
        </div>
        <div class="action-row">
          <button class="ct-btn-primary" onclick="avancar()" style="flex:1">Continuar</button>
        </div>
      </div>

      <!-- Passo 1: senha -->
      <div id="step-1" style="display:none">

        <!-- Resumo -->
        <div class="summary-box" id="resumo-box"></div>

        <div class="form-field" style="margin-bottom:14px">
          <label class="ct-label" for="senha">Senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="senha"
                   placeholder="Mínimo 6 caracteres" />
            <button type="button" class="eye-btn" onclick="toggleSenha('senha','eye-senha')">
              <svg id="eye-senha" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="err-senha" style="display:none"></div>
        </div>

        <div class="form-field">
          <label class="ct-label" for="confirma">Confirmar senha</label>
          <div class="ct-input-wrap">
            <input class="ct-input" type="password" id="confirma"
                   placeholder="Repita a senha" />
            <button type="button" class="eye-btn" onclick="toggleSenha('confirma','eye-confirma')">
              <svg id="eye-confirma" viewBox="0 0 24 24" stroke-width="2" fill="none"
                   stroke="currentColor" style="width:16px;height:16px">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <div class="ct-error" id="err-confirma" style="display:none"></div>
        </div>

        <div class="action-row">
          <button class="ct-btn-ghost" onclick="voltar()">Voltar</button>
          <button class="ct-btn-primary" id="btn-finalizar" onclick="finalizar()">
            Acessar o painel
          </button>
        </div>
      </div>

      <!-- Tela de sucesso -->
      <div class="success-screen" id="success-screen">
        <div class="success-icon">
          <svg viewBox="0 0 24 24" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round" fill="none" stroke="#16A34A">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
        </div>
        <h3>Cadastro concluído!</h3>
        <p id="success-msg"></p>
        <a href="login.html" class="ct-btn-primary"
           style="width:auto;display:inline-flex;padding:11px 32px;text-decoration:none">
          Ir para o login
        </a>
      </div>

    </div>

    <p class="anim-3"
       style="text-align:center;font-size:13px;color:var(--n-400);margin-top:18px">
      Já tem conta?
      <a href="login.html"
         style="color:var(--p-600);font-weight:600;text-decoration:none">
        Fazer login
      </a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin-cadastro.js"></script>
</body>
</html>
