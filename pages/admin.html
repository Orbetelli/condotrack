<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CondoTrack — Painel do Síndico</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body>
<div class="shell">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sb-logo" style="padding:4px">
      <img src="../img/logo.png" alt="CondoTrack" style="width:36px;height:36px;object-fit:contain;border-radius:6px"/>
    </div>
    <nav class="sb-nav">
      <button class="sb-item active" data-tip="Dashboard" onclick="ativarSidebar(this);mudarTab('dashboard')">
        <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      </button>
      <button class="sb-item" data-tip="Porteiros" onclick="ativarSidebar(this);mudarTab('porteiros')">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
      </button>
      <button class="sb-item" data-tip="Moradores" onclick="ativarSidebar(this);mudarTab('moradores')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      </button>
      <button class="sb-item" data-tip="Apartamentos" onclick="ativarSidebar(this);mudarTab('apartamentos')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </button>
      <button class="sb-item" data-tip="Entregas" onclick="ativarSidebar(this);mudarTab('entregas')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      </button>
      <button class="sb-item" data-tip="Relatórios" onclick="ativarSidebar(this);mudarTab('relatorios')">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </button>
      <div class="sb-divider"></div>
      <button class="sb-item" data-tip="Configurações" onclick="ativarSidebar(this)">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
      </button>
      <button class="sb-item" data-tip="Sair" onclick="encerrarSessao()">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </nav>
    <div class="sb-avatar" id="sb-avatar">JS</div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <header class="header">
      <div>
        <div class="header-title" id="header-condo">—</div>
        <div class="header-sub"   id="header-sindico">—</div>
      </div>
      <div class="header-right">
        <span class="header-badge">Síndico</span>
        <button class="btn-action" id="btn-acao" style="display:none">
          <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    </header>

    <nav class="nav-tabs">
      <div class="nav-tab active" data-tab="dashboard"    onclick="mudarTab('dashboard')">
        <svg viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="nav-tab" data-tab="porteiros"    onclick="mudarTab('porteiros')">
        <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
        Porteiros
      </div>
      <div class="nav-tab" data-tab="moradores"    onclick="mudarTab('moradores')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Moradores
      </div>
      <div class="nav-tab" data-tab="apartamentos" onclick="mudarTab('apartamentos')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Apartamentos
      </div>
      <div class="nav-tab" data-tab="entregas" onclick="mudarTab('entregas')">
        <svg viewBox="0 0 24 24" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Entregas
      </div>
      <div class="nav-tab" data-tab="relatorios"   onclick="mudarTab('relatorios')">
        <svg viewBox="0 0 24 24" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        Relatórios
      </div>
    </nav>

    <main class="body" id="tab-body"></main>
  </div>
</div>

<!-- ── Modal: porteiro ── -->
<div class="modal-overlay" id="modal-porteiro">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-port-title">Novo porteiro</div>
      <button class="modal-close" onclick="fecharModal()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="form-porteiro" novalidate>
      <div class="modal-field">
        <label class="ct-label" for="p-nome">Nome completo</label>
        <input class="ct-input" type="text" id="p-nome" placeholder="Carlos da Silva" />
        <div class="ct-error" id="err-p-nome" style="display:none"></div>
      </div>
      <div class="modal-field">
        <label class="ct-label" for="p-email">E-mail de acesso</label>
        <input class="ct-input" type="email" id="p-email" placeholder="porteiro@email.com" />
        <div class="ct-error" id="err-p-email" style="display:none"></div>
      </div>
      <div class="modal-grid">
        <div class="modal-field">
          <label class="ct-label" for="p-turno">Turno</label>
          <select class="ct-input" id="p-turno">
            <option value="A">Turno A</option>
            <option value="B">Turno B</option>
            <option value="C">Turno C</option>
          </select>
        </div>
        <div class="modal-field">
          <label class="ct-label" for="p-periodo">Período</label>
          <select class="ct-input" id="p-periodo">
            <option>Manhã</option>
            <option>Tarde</option>
            <option>Noite</option>
          </select>
        </div>
      </div>
      <div style="font-size:12px;color:var(--n-400);margin-bottom:4px">
        Uma senha temporária será enviada por e-mail ao porteiro.
      </div>
      <div class="modal-actions">
        <button type="button" class="ct-btn-ghost" onclick="fecharModal()">Cancelar</button>
        <button type="submit" class="ct-btn-primary">
          <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none" stroke="currentColor"
               style="width:14px;height:14px" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Salvar porteiro
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ── Modal: morador ── -->
<div class="modal-overlay" id="modal-morador">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Pré-cadastrar morador</div>
      <button class="modal-close" onclick="fecharModal()">
        <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <form id="form-morador" novalidate>
      <div class="modal-field">
        <label class="ct-label" for="m-nome">Nome completo</label>
        <input class="ct-input" type="text" id="m-nome" placeholder="Maria da Silva" />
        <div class="ct-error" id="err-m-nome" style="display:none"></div>
      </div>
      <div class="modal-grid">
        <div class="modal-field">
          <label class="ct-label" for="m-apto">Apartamento</label>
          <input class="ct-input" type="text" id="m-apto" placeholder="204-B" />
          <div class="ct-error" id="err-m-apto" style="display:none"></div>
        </div>
        <div class="modal-field">
          <label class="ct-label" for="m-cpf">CPF</label>
          <input class="ct-input" type="text" id="m-cpf" placeholder="000.000.000-00" maxlength="14" />
        </div>
      </div>
      <div class="modal-field">
        <label class="ct-label" for="m-email">E-mail</label>
        <input class="ct-input" type="email" id="m-email" placeholder="morador@email.com" />
        <div class="ct-error" id="err-m-email" style="display:none"></div>
      </div>
      <div style="font-size:12px;color:var(--n-400);margin-bottom:4px">
        O morador poderá se cadastrar usando o CPF cadastrado aqui.
      </div>
      <div class="modal-actions">
        <button type="button" class="ct-btn-ghost" onclick="fecharModal()">Cancelar</button>
        <button type="submit" class="ct-btn-primary">
          <svg viewBox="0 0 24 24" stroke-width="2.5" fill="none" stroke="currentColor"
               style="width:14px;height:14px" stroke-linecap="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          Pré-cadastrar
        </button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="../js/utils.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
